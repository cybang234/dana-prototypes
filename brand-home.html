<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한샘 브랜드홈</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e8e8;
  display: flex; justify-content: center;
  padding: 32px 0 80px;
  font-family: Pretendard, -apple-system, sans-serif;
}
.phone {
  width: 375px; background: #fff;
  border-radius: 40px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  position: relative;
}
.status-bar {
  height: 44px; background: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.status-time { font-family: 'SF Pro Text', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.28px; }
.status-icons { display: flex; align-items: center; gap: 5px; }
.top-nav {
  height: 44px; background: #fff;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.nav-icon { width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.scroll-area {
  height: 724px;
  overflow-y: auto;
}
.scroll-area::-webkit-scrollbar { display: none; }
.scroll-area img {
  width: 100%; display: block;
}

/* Mobile: 풀스크린, status bar 숨김 */
@media (max-width: 500px) {
  body {
    background: #fff;
    padding: 0;
    display: block;
  }
  .phone {
    width: 100%;
    border-radius: 0;
    box-shadow: none;
  }
  .status-bar { display: none; }
  .top-nav {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .scroll-area {
    height: auto;
    overflow-y: visible;
  }
}
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><rect x="0.5" y="0.5" width="3" height="10" rx="1" fill="#141414"/><rect x="4.5" y="2.5" width="3" height="8" rx="1" fill="#141414"/><rect x="8.5" y="4.5" width="3" height="6" rx="1" fill="#141414"/><rect x="12.5" y="6.5" width="3" height="4" rx="1" fill="#141414"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><path d="M7.5 3.5C9.43 3.5 11.13 4.33 12.33 5.67L14 4C12.35 2.17 10.05 1 7.5 1C4.95 1 2.65 2.17 1 4L2.67 5.67C3.87 4.33 5.57 3.5 7.5 3.5Z" fill="#141414"/><path d="M7.5 6.5C8.6 6.5 9.59 6.95 10.33 7.67L12 6C10.8 4.89 9.22 4.2 7.5 4.2C5.78 4.2 4.2 4.89 3 6L4.67 7.67C5.41 6.95 6.4 6.5 7.5 6.5Z" fill="#141414"/><circle cx="7.5" cy="10" r="1.5" fill="#141414"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="2" stroke="#141414" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1" fill="#141414"/><path d="M23 4.5V7.5C23.83 7.17 24.33 6.42 24.33 5.5V6.5C24.33 5.58 23.83 4.83 23 4.5Z" fill="#141414" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="top-nav">
    <div class="nav-icon" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M13.07 4.56c.33.37.3.94-.07 1.27L5.17 12.8H21.5c.5 0 .9.4.9.9s-.4.9-.9.9H5.17l7.83 6.96c.37.33.4.9.07 1.27-.33.37-.9.4-1.27.07L2.2 14.37a.9.9 0 0 1-.3-.67c0-.26.11-.5.3-.67L11.8 4.5c.37-.33.94-.3 1.27.07Z" fill="#2F3438"/></svg>
    </div>
    <div class="nav-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#141414" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="#141414" stroke-width="1.6" stroke-linecap="round"/><path d="M16 10a4 4 0 01-8 0" stroke="#141414" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="scroll-area">
    <img src="brand-home-1.png" alt="">
    <img src="brand-home-2.png" alt="">
    <img src="brand-home-3.png" alt="">
    <img src="brand-home-4.png" alt="">
  </div>
</div>
</body>
</html>
