<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>한샘 브랜드홈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e8e8;
  display: flex; justify-content: center;
  padding: 32px 0 80px;
}
.phone {
  width: 375px; background: #fff;
  border-radius: 40px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  position: relative;
}
.scroll-area {
  height: 812px;
  overflow-y: auto;
}
.scroll-area::-webkit-scrollbar { display: none; }
.scroll-area img {
  width: 100%; display: block;
}
</style>
</head>
<body>
<div class="phone">
  <div class="scroll-area">
    <img src="brand-home-1.png" alt="">
    <img src="brand-home-2.png" alt="">
    <img src="brand-home-3.png" alt="">
    <img src="brand-home-4.png" alt="">
  </div>
</div>
</body>
</html>
