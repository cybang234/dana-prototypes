<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dana Todo</title>
<style>
:root {
  --bg: #FFFFFF;
  --fg: #141414;
  --fg-mid: #4A4A4A;
  --fg-weak: #999999;
  --line: #F2F2F2;
  --line-strong: #E8E8E8;
  --p1: #FF3B30;
  --p2: #FF9500;
  --p3: #FFCC00;
  --p4: #B0B0B0;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
  -webkit-font-smoothing: antialiased;
}
.top {
  padding: 20px 20px 4px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.app-meta {
  font-size: 11px; font-weight: 600;
  color: var(--fg-weak);
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
.refresh-btn {
  background: none; border: 0; padding: 4px;
  color: var(--fg-mid);
  cursor: pointer;
  display: inline-flex;
}
.refresh-btn svg { width: 16px; height: 16px; }
.head {
  padding: 4px 20px 16px;
  display: flex; align-items: baseline; gap: 8px;
}
.count {
  font-size: 44px; font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
}
.count-label {
  font-size: 14px; font-weight: 500;
  color: var(--fg-weak);
}
.sub {
  margin: 4px 20px 0;
  font-size: 12px;
  color: var(--fg-weak);
}

.tabs {
  display: flex;
  gap: 12px;
  padding: 16px 20px 10px;
  align-items: baseline;
}
.tab {
  background: none; border: 0; padding: 0;
  font-family: inherit;
  font-size: 15px; font-weight: 700;
  color: var(--fg-weak);
  cursor: pointer;
}
.tab.on { color: var(--fg); font-weight: 800; }
.tab .c { margin-left: 4px; }

.list {
  padding: 0 20px 24px;
  display: flex; flex-direction: column;
}
.row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
}
.row:last-child { border-bottom: 0; }
.row:hover { background: #FAFAFA; }
.row.done .title { color: var(--fg-weak); text-decoration: line-through; }

.checkbox {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1.5px solid #D0D0D0;
  background: #fff;
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.checkbox.checked { background: var(--fg); border-color: var(--fg); }
.checkbox.checked svg { display: block; }
.checkbox svg { display: none; width: 12px; height: 12px; color: #fff; }

.priority {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 5px;
  font-size: 10px; font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}
.p1 { background: var(--p1); }
.p2 { background: var(--p2); }
.p3 { background: var(--p3); color: #4a3500; }
.p4 { background: var(--p4); }

.title-text {
  flex: 1;
  font-size: 13px; font-weight: 500;
  letter-spacing: -0.3px;
  word-break: keep-all;
}

.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--fg-weak);
  font-size: 13px;
}

.last-sync {
  text-align: center;
  font-size: 11px;
  color: var(--fg-weak);
  padding: 8px 0 16px;
}
</style>
</head>
<body>
<div class="top">
  <span class="app-meta">DANA · TODO</span>
  <button class="refresh-btn" id="refresh" aria-label="새로고침">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 0 1 15.5-6.3M21 4v5h-5M21 12a9 9 0 0 1-15.5 6.3M3 20v-5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>
<div class="head">
  <span class="count" id="open-count">0</span>
  <span class="count-label">개 처리할 일</span>
</div>
<div class="sub">슬랙 todo-list 채널에서 자동 수집</div>

<div class="tabs">
  <button class="tab on" data-tab="open">할 일<span class="c" id="open-c">0</span></button>
  <button class="tab" data-tab="done">완료<span class="c" id="done-c">0</span></button>
</div>

<div class="list" id="list"></div>

<div class="last-sync" id="last-sync">동기화 대기</div>

<script src="sidepanel.js"></script>
</body>
</html>
