<!-- 기존 라이브 탭 (집요한라이브 KV + 라이브 캘린더) 백업
     bigpromo-event.html에서 새 시안으로 교체 전 보관용
-->
<div class="tab-pane" id="tab-pane-live">

  <!-- 7-1 집요한라이브 -->
  <section class="recommend-bundle live-bundle">
    <div class="header-container">
      <img class="live-logo" src="./assets/logo-jipyohan-live.png" alt="집요한라이브"/>
      <p class="bundle-description">라이브에서 가장 좋은 혜택을 만나요</p>
    </div>
    <div class="live-feature-list">
      <div class="live-kv-card">
        <span class="live-kv-coupon">6.8 월 20:00</span>
        <div class="live-kv-info">
          <div class="live-kv-text">
            <div class="live-kv-title">시몬스 스마트팩 ~46%</div>
            <div class="live-kv-sub">오늘의집 단독 최저가</div>
          </div>
          <button class="live-kv-cta">
            <span>지금 방송 보기</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="live-thumb-stack">
        <div class="live-thumb"></div>
        <div class="live-thumb t2"></div>
        <div class="live-thumb t3"></div>
        <div class="live-thumb t4"></div>
      </div>
    </div>
  </section>

  <div class="module-divider"></div>

  <!-- 7-2 라이브 캘린더 -->
  <section class="recommend-bundle cal-bundle">
    <div class="live-cal-header">
      <h2 class="cal-title">라이브 캘린더</h2>
      <button class="box-button">
        <span class="label">라이브 알림받기</span>
        <span class="icon"><img src="./assets/icon-bell.svg" alt="bell"/></span>
      </button>
    </div>
    <div class="chip-strip">
      <button class="chip chip-solid">6.8 월</button>
      <button class="chip chip-normal">6.9 화</button>
      <button class="chip chip-normal">6.10 수</button>
      <button class="chip chip-normal">6.11 목</button>
      <button class="chip chip-normal">6.12 금</button>
    </div>
    <div class="cal-list">
      <div class="cal-row">
        <span class="cal-badge">20:00</span>
        <div class="cal-brands">
          <div class="cal-brand"><div class="cal-brand-thumb"></div><span class="cal-brand-name">베베앙</span></div>
          <div class="cal-brand"><div class="cal-brand-thumb b2"></div><span class="cal-brand-name">미마</span></div>
        </div>
      </div>
      <hr class="cal-divider">
      <div class="cal-row">
        <span class="cal-badge">21:00</span>
        <div class="cal-brands">
          <div class="cal-brand"><div class="cal-brand-thumb b3"></div><span class="cal-brand-name">에싸</span></div>
        </div>
      </div>
      <hr class="cal-divider">
      <div class="cal-row">
        <span class="cal-badge">22:00</span>
        <div class="cal-brands">
          <div class="cal-brand"><div class="cal-brand-thumb b4"></div><span class="cal-brand-name">미닉스</span></div>
        </div>
      </div>
    </div>
  </section>

</div>
