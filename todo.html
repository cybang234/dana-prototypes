<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Todo">
<title>Dana Todo</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./assets/todo-icon-180.png">
<link rel="icon" type="image/png" href="./assets/todo-icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --fg: #141414;
  --fg-mid: #4A4A4A;
  --fg-weak: #999999;
  --line: #F2F2F2;
  --line-strong: #E8E8E8;
  --p1: #FF3B30;
  --p2: #FF9500;
  --p3: #FFCC00;
  --p4: #B0B0B0;
  --accent: #0064FF;
  --bg-soft: #F7F7F8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
body {
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* Top nav (시계 아이콘 + 추가 + 검색 + 차트 + 더보기) */
.top-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px;
}
.top-nav .left {
  display: flex; align-items: center; gap: 8px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.top-nav .logo {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.top-nav .right {
  display: flex; align-items: center; gap: 16px;
  color: var(--fg);
}
.top-nav .icon {
  width: 22px; height: 22px;
  cursor: pointer;
  color: var(--fg);
}

/* Schedule (오늘 일정) */
.schedule {
  display: flex;
  gap: 8px;
  padding: 12px 20px 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.schedule::-webkit-scrollbar { display: none; }
.schedule-card {
  flex-shrink: 0;
  min-width: 138px;
  padding: 8px 0;
  border-top: 2px solid var(--fg);
}
.schedule-card.past { border-top-color: var(--line-strong); }
.schedule-card.past .schedule-time,
.schedule-card.past .schedule-title,
.schedule-card.past .schedule-loc { color: var(--fg-weak); text-decoration: line-through; }
.schedule-time {
  font-size: 12px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.schedule-title {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.schedule-loc {
  margin-top: 2px;
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
}

/* Tab */
.tabs {
  display: flex;
  gap: 14px;
  padding: 20px 20px 12px;
  align-items: baseline;
}
.tab {
  background: none;
  border: 0;
  padding: 0;
  font-family: inherit;
  font-size: 18px;
  font-weight: 700;
  color: var(--fg-weak);
  cursor: pointer;
  letter-spacing: -0.3px;
}
.tab.on {
  color: var(--fg);
  font-weight: 800;
}
.tab .count {
  margin-left: 4px;
  font-weight: 700;
}
.tab.on .count { color: var(--fg); }

/* Todo list */
.todo-list {
  display: flex; flex-direction: column;
  padding: 0 20px 100px;
}
.todo-row {
  display: flex; align-items: center;
  gap: 12px;
  padding: 12px 0;
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.todo-row:last-child { border-bottom: 0; }
.todo-row:active { opacity: 0.6; }

.checkbox {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid #D0D0D0;
  background: #fff;
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.checkbox.checked {
  background: var(--fg);
  border-color: var(--fg);
}
.checkbox.checked svg { display: block; }
.checkbox svg { display: none; width: 14px; height: 14px; color: #fff; }

.priority {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0;
}
.priority.p1 { background: var(--p1); }
.priority.p2 { background: var(--p2); }
.priority.p3 { background: var(--p3); color: #4a3500; }
.priority.p4 { background: var(--p4); }

.todo-title {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.3px;
  word-break: keep-all;
}
.todo-row.done .todo-title {
  color: var(--fg-weak);
  text-decoration: line-through;
}
.todo-row.done .checkbox {
  background: var(--fg);
  border-color: var(--fg);
}
.todo-row.done .checkbox svg { display: block; }

.todo-meta {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
}

/* Bottom action bar */
.action-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0));
  background: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--line);
}
.action-bar .icon-btn {
  width: 32px; height: 32px;
  border: 0;
  background: none;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--fg-mid);
  border-radius: 8px;
}
.action-bar .add {
  width: 36px; height: 36px;
  background: var(--fg);
  color: #fff;
  border-radius: 50%;
}

/* Empty */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--fg-weak);
  font-size: 14px;
}

/* ============ Todo Detail Page (full screen overlay) ============ */
.detail-page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  max-width: 480px;
  margin: 0 auto;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.detail-page.open { transform: translateY(0); }

.detail-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
}
.detail-nav .left, .detail-nav .right {
  display: flex; align-items: center; gap: 18px;
}
.detail-nav button {
  width: 28px; height: 28px;
  background: none; border: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--fg);
}
.detail-nav button svg { width: 22px; height: 22px; }

.detail-head {
  padding: 12px 20px 4px;
  display: flex; align-items: center; gap: 12px;
}
.detail-head .checkbox {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1.5px solid #D0D0D0;
  background: #fff;
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.detail-head .checkbox svg { display: none; width: 14px; height: 14px; color: #fff; }
.detail-head .checkbox.checked { background: var(--fg); border-color: var(--fg); }
.detail-head .checkbox.checked svg { display: block; }
.detail-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.5px;
  word-break: keep-all;
  line-height: 30px;
}

.detail-meta {
  padding: 16px 20px 8px;
  display: flex; flex-direction: column;
  gap: 14px;
}
.meta-row {
  display: flex; align-items: center; gap: 10px;
}
.meta-row .icon {
  width: 18px; height: 18px;
  color: var(--fg-weak);
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
}
.meta-row .icon svg { width: 18px; height: 18px; }
.meta-row .value {
  font-size: 14px;
  font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.meta-row .value-weak { color: var(--fg-weak); }
.meta-row a.value-link {
  color: var(--fg);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.meta-row a.value-link .ext {
  width: 14px; height: 14px;
  color: var(--fg-weak);
}

.detail-priority-badge {
  display: inline-flex; align-items: center; justify-content: center;
  height: 22px;
  padding: 0 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.detail-priority-badge.p1 { background: var(--p1); }
.detail-priority-badge.p2 { background: var(--p2); }
.detail-priority-badge.p3 { background: var(--p3); color: #4a3500; }
.detail-priority-badge.p4 { background: var(--p4); }

.detail-divider {
  height: 1px;
  background: var(--line);
  margin: 8px 20px;
}

.detail-body {
  padding: 16px 20px 40px;
  font-size: 15px;
  font-weight: 500;
  line-height: 24px;
  color: var(--fg);
  letter-spacing: -0.3px;
  white-space: pre-wrap;
  word-break: keep-all;
  flex: 1;
  overflow-y: auto;
}
</style>
</head>
<body>

<header class="top-nav">
  <div class="left">
    <span class="logo">🔥</span>
  </div>
  <div class="right">
    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 19V11M10 19V5M16 19V8M22 19H2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="18" cy="12" r="1.6" fill="currentColor"/></svg>
  </div>
</header>

<!-- 오늘 일정 (schedule) -->
<section class="schedule" id="schedule"></section>

<!-- Tab -->
<nav class="tabs">
  <button class="tab on" data-tab="open">할 일<span class="count" id="open-count">0</span></button>
  <button class="tab" data-tab="later">다음에<span class="count" id="later-count">0</span></button>
</nav>

<!-- Todo list -->
<section class="todo-list" id="todo-list"></section>

<!-- Detail overlay -->
<div class="detail-page" id="detail-page">
  <div class="detail-nav">
    <div class="left">
      <button id="detail-back" aria-label="뒤로">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="right">
      <button aria-label="포커스"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg></button>
      <button aria-label="저장"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4v12m0 0l-5-5m5 5l5-5M5 20h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button aria-label="삭제"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>
  <div class="detail-head">
    <span class="checkbox" id="detail-checkbox">
      <svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="detail-title" id="detail-title"></span>
  </div>
  <div class="detail-meta">
    <div class="meta-row">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 7l9-3 9 3v10l-9 3-9-3V7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </span>
      <span class="detail-priority-badge" id="detail-priority">P1</span>
    </div>
    <div class="meta-row">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
      <span class="value" id="detail-created"></span>
    </div>
    <div class="meta-row">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M10 13a4 4 0 005.66 0l3-3a4 4 0 00-5.66-5.66l-1 1M14 11a4 4 0 00-5.66 0l-3 3a4 4 0 005.66 5.66l1-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <a class="value-link" id="detail-source" target="_blank" rel="noopener noreferrer">
        연결된 슬랙 메시지
        <span class="ext"><svg viewBox="0 0 14 14" fill="none"><path d="M5 3h6v6M11 3L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </a>
    </div>
  </div>
  <div class="detail-divider"></div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Bottom action -->
<div class="action-bar">
  <button class="icon-btn" aria-label="메일">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4 6l8 7 8-7" stroke="currentColor" stroke-width="1.6"/></svg>
  </button>
  <button class="icon-btn add" aria-label="추가">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>

<script>
let SCHEDULE = [];
let TODOS = [];
let activeTab = 'open';

async function fetchData() {
  try {
    const calRes = await fetch('./data/calendar.json?t=' + Date.now());
    const calData = await calRes.json();
    SCHEDULE = calData.events || [];
  } catch (e) {
    SCHEDULE = [];
  }
  try {
    const todoRes = await fetch('./data/todos.json?t=' + Date.now());
    const todoData = await todoRes.json();
    const open = (todoData.todos || []).map(t => ({ ...t, tab: 'open' }));
    const later = (todoData.later || []).map(t => ({ ...t, tab: 'later' }));
    TODOS = [...open, ...later];
  } catch (e) {
    TODOS = [];
  }
}

function renderSchedule() {
  const el = document.getElementById('schedule');
  el.innerHTML = '';
  SCHEDULE.forEach(s => {
    const card = document.createElement('div');
    card.className = 'schedule-card' + (s.state === 'past' ? ' past' : '');
    card.innerHTML = `
      <div class="schedule-time">${s.time}</div>
      <div class="schedule-title">${s.title}</div>
      <div class="schedule-loc">${s.loc}</div>
    `;
    el.appendChild(card);
  });
}

function prRank(p) { return { P1: 1, P2: 2, P3: 3, P4: 4 }[p] ?? 9; }

function renderTodos() {
  // tab counts
  document.getElementById('open-count').textContent = ' ' + TODOS.filter(t => t.tab === 'open' && !t.done).length;
  document.getElementById('later-count').textContent = ' ' + TODOS.filter(t => t.tab === 'later' && !t.done).length;

  // active tab
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === activeTab));

  // list
  const list = TODOS.filter(t => t.tab === activeTab).sort((a, b) => prRank(a.priority) - prRank(b.priority));
  const el = document.getElementById('todo-list');
  el.innerHTML = '';
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">모두 처리되었어요. 👏</div>';
    return;
  }
  list.forEach(t => {
    const row = document.createElement('div');
    row.className = 'todo-row' + (t.done ? ' done' : '');
    row.innerHTML = `
      <span class="checkbox ${t.done ? 'checked' : ''}" data-id="${t.id}">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="priority ${t.priority.toLowerCase()}">${t.priority}</span>
      <span class="todo-title">${t.title}</span>
    `;
    row.querySelector('.checkbox').addEventListener('click', (e) => {
      e.stopPropagation();
      t.done = !t.done;
      renderTodos();
    });
    row.addEventListener('click', (e) => {
      if (e.target.closest('.checkbox')) return;
      openDetail(t);
    });
    el.appendChild(row);
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => { activeTab = t.dataset.tab; renderTodos(); });
});

// ============ Detail overlay ============
const detailEl = document.getElementById('detail-page');
const detailTitleEl = document.getElementById('detail-title');
const detailPriorityEl = document.getElementById('detail-priority');
const detailCreatedEl = document.getElementById('detail-created');
const detailSourceEl = document.getElementById('detail-source');
const detailBodyEl = document.getElementById('detail-body');
const detailCheckboxEl = document.getElementById('detail-checkbox');
let detailCurrentTodo = null;

function openDetail(t) {
  detailCurrentTodo = t;
  detailTitleEl.textContent = t.title;
  detailPriorityEl.textContent = t.priority;
  detailPriorityEl.className = 'detail-priority-badge ' + t.priority.toLowerCase();
  // 등록 시각
  const created = t.createdAt || '';
  const team = t.team ? ` · ${t.team}` : '';
  const requester = t.requester ? ` · @${t.requester}` : '';
  detailCreatedEl.textContent = `${created}${team}${requester} 등록`;
  // 슬랙 링크
  if (t.source) {
    detailSourceEl.href = t.source;
    detailSourceEl.style.display = '';
  } else {
    detailSourceEl.style.display = 'none';
  }
  // 본문
  const body = t.body || `(${t.channel || '슬랙'} 채널에서 ${t.requester || '요청자'} 님이 작업을 요청했어요)`;
  detailBodyEl.textContent = body;
  // 체크 상태
  detailCheckboxEl.classList.toggle('checked', !!t.done);

  detailEl.classList.add('open');
}
function closeDetail() {
  detailEl.classList.remove('open');
  detailCurrentTodo = null;
}
document.getElementById('detail-back').addEventListener('click', closeDetail);
detailCheckboxEl.addEventListener('click', () => {
  if (!detailCurrentTodo) return;
  detailCurrentTodo.done = !detailCurrentTodo.done;
  detailCheckboxEl.classList.toggle('checked', detailCurrentTodo.done);
  renderTodos();
});

async function init() {
  await fetchData();
  renderSchedule();
  renderTodos();
}
init();
</script>

</body>
</html>
