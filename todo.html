<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Todo">
<title>Dana Todo</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./assets/todo-icon-180.png">
<link rel="icon" type="image/png" href="./assets/todo-icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --fg: #141414;
  --fg-mid: #4A4A4A;
  --fg-weak: #999999;
  --line: #F2F2F2;
  --line-strong: #E8E8E8;
  --p1: #FF3B30;
  --p2: #FF9500;
  --p3: #FFCC00;
  --p4: #B0B0B0;
  --accent: #0064FF;
  --bg-soft: #F7F7F8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}
body {
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
  min-height: 100vh;
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  overflow-x: hidden;
}
* { box-sizing: border-box; }
img, video, iframe { max-width: 100%; }

/* Top nav (시계 아이콘 + 추가 + 검색 + 차트 + 더보기) */
.top-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px;
}
.top-nav .left {
  display: flex; align-items: center; gap: 8px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.top-nav .logo {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.top-nav .right {
  display: flex; align-items: center; gap: 12px;
  color: var(--fg);
}
.top-nav .icon {
  width: 22px; height: 22px;
  color: var(--fg);
}
.top-nav .icon-btn {
  background: none; border: 0; padding: 4px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg);
}
.top-nav .icon-btn:active { opacity: 0.5; }
.top-nav .icon-btn.spinning .icon { animation: spin 0.8s linear infinite; }
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Schedule (오늘 일정) */
.schedule {
  display: flex;
  gap: 8px;
  padding: 12px 20px 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.schedule::-webkit-scrollbar { display: none; }
.schedule-card {
  flex-shrink: 0;
  min-width: 138px;
  padding: 8px 0;
  border-top: 2px solid var(--fg);
}
.schedule-card.past { border-top-color: var(--line-strong); }
.schedule-card.past .schedule-time,
.schedule-card.past .schedule-title,
.schedule-card.past .schedule-loc { color: var(--fg-weak); text-decoration: line-through; }
.schedule-time {
  font-size: 12px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.schedule-title {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.schedule-loc {
  margin-top: 2px;
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
}

/* Tab */
.tabs {
  display: flex;
  gap: 14px;
  padding: 20px 20px 12px;
  align-items: baseline;
}
.tab {
  background: none;
  border: 0;
  padding: 0;
  font-family: inherit;
  font-size: 18px;
  font-weight: 700;
  color: var(--fg-weak);
  cursor: pointer;
  letter-spacing: -0.3px;
}
.tab.on {
  color: var(--fg);
  font-weight: 800;
}
.tab .count {
  margin-left: 4px;
  font-weight: 700;
}
.tab.on .count { color: var(--fg); }

/* Todo list */
.todo-list {
  display: flex; flex-direction: column;
  padding: 0 20px 100px;
}
.todo-row {
  display: flex; align-items: center;
  gap: 12px;
  padding: 12px 0;
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.todo-row:last-child { border-bottom: 0; }
.todo-row:active { opacity: 0.6; }

.checkbox {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid #D0D0D0;
  background: #fff;
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.checkbox.checked {
  background: var(--fg);
  border-color: var(--fg);
}
.checkbox.checked svg { display: block; }
.checkbox svg { display: none; width: 14px; height: 14px; color: #fff; }

.priority {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0;
}
.priority.p1 { background: var(--p1); }
.priority.p2 { background: var(--p2); }
.priority.p3 { background: var(--p3); color: #4a3500; }
.priority.p4 { background: var(--p4); }

.todo-title {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.3px;
  word-break: keep-all;
}
.todo-row.done .todo-title {
  color: var(--fg-weak);
  text-decoration: line-through;
}
.todo-row.done .checkbox {
  background: var(--fg);
  border-color: var(--fg);
}
.todo-row.done .checkbox svg { display: block; }

.todo-meta {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
}

/* Bottom action bar */
.action-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0));
  background: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--line);
}
.action-bar .icon-btn {
  width: 32px; height: 32px;
  border: 0;
  background: none;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--fg-mid);
  border-radius: 8px;
}
.action-bar .add {
  width: 36px; height: 36px;
  background: var(--fg);
  color: #fff;
  border-radius: 50%;
}

/* Empty */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--fg-weak);
  font-size: 14px;
}

/* ============ Newsletter list ============ */
.newsletter-list {
  padding: 0 20px 100px;
  display: flex; flex-direction: column;
}
.newsletter-list[hidden],
.todo-list[hidden] { display: none !important; }
.nl-row {
  display: flex; flex-direction: column;
  gap: 2px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
}
.nl-row:active { opacity: 0.6; }
.nl-row:last-child { border-bottom: 0; }
.nl-meta {
  font-size: 11px; font-weight: 500;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
}
.nl-subject {
  font-size: 15px; font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.3px;
  line-height: 22px;
  word-break: keep-all;
}
.nl-snippet {
  font-size: 12px; font-weight: 400;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
  line-height: 18px;
  margin-top: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ============ Calendar page ============ */
.cal-page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 105;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  max-width: 480px;
  margin: 0 auto;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
  overflow-y: auto;
}
.cal-page.open { transform: translateY(0); }
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px;
}
.cal-nav button {
  width: 28px; height: 28px;
  background: none; border: 0; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--fg);
}
.cal-nav button svg { width: 20px; height: 20px; }
.cal-month-switch {
  display: flex; align-items: center; gap: 8px;
}
.cal-month-label {
  font-size: 16px; font-weight: 700;
  letter-spacing: -0.3px;
  min-width: 110px;
  text-align: center;
}
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 12px 16px 8px;
  font-size: 11px; font-weight: 600;
  color: var(--fg-weak);
  text-align: center;
}
.cal-weekdays span:first-child { color: var(--p1); }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 16px;
  gap: 2px;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
}
.cal-cell.muted { color: #D5D5D5; }
.cal-cell.today { font-weight: 800; }
.cal-cell.today::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1.5px solid var(--fg);
  border-radius: 10px;
}
.cal-cell.selected {
  background: var(--fg);
  color: #fff;
}
.cal-cell.selected.today::before { border-color: transparent; }
.cal-cell .dot {
  position: absolute;
  bottom: 5px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--p1);
}
.cal-cell.selected .dot { background: #fff; }

.cal-divider {
  margin: 16px 20px 0;
  border-top: 1px solid var(--line);
}
.cal-day-section {
  padding: 16px 20px 40px;
}
.cal-day-label {
  font-size: 17px; font-weight: 700;
  margin-bottom: 16px;
  letter-spacing: -0.3px;
}
.cal-day-block {
  margin-bottom: 18px;
}
.cal-day-block-title {
  font-size: 12px; font-weight: 600;
  color: var(--fg-weak);
  margin-bottom: 6px;
}
.cal-day-events, .cal-day-todos {
  display: flex; flex-direction: column;
  gap: 4px;
}
.cal-evt-row, .cal-todo-row {
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
  font-size: 14px; font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.cal-evt-row .time, .cal-todo-row .time {
  color: var(--fg-weak);
  font-size: 12px;
  font-weight: 500;
  margin-right: 6px;
}
.cal-empty {
  padding: 12px 0;
  font-size: 13px;
  color: var(--fg-weak);
}

/* 뉴스레터 상세 페이지 */
.nl-detail-page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 110;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  max-width: 480px;
  margin: 0 auto;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nl-detail-page.open { transform: translateY(0); }
.nl-detail-page,
.nl-detail-page * { box-sizing: border-box; }
.nl-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.nl-btn {
  -webkit-appearance: none;
  appearance: none;
  display: inline-flex !important;
  align-items: center;
  justify-content: center;
  width: auto !important;
  min-width: 0;
  max-width: none;
  height: 32px !important;
  padding: 0 12px !important;
  border-radius: 8px !important;
  font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px !important;
  font-weight: 600 !important;
  line-height: 1;
  letter-spacing: -0.3px;
  text-decoration: none !important;
  white-space: nowrap;
  overflow: visible;
  cursor: pointer;
  border: 0 !important;
  flex: 0 0 auto;
  box-sizing: border-box;
}
.nl-btn-ghost { background: #F4F4F4 !important; color: #141414 !important; }
.nl-btn-primary { background: #141414 !important; color: #FFFFFF !important; }
.nl-btn:active { opacity: 0.85; }
.nl-detail-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
}
.nl-detail-nav button {
  width: 28px; height: 28px;
  background: none; border: 0; padding: 0;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg);
}
.nl-detail-nav button svg { width: 22px; height: 22px; }
.nl-detail-head {
  padding: 12px 20px 16px;
  display: flex; flex-direction: column;
  gap: 8px;
}
.nl-detail-meta {
  font-size: 12px; font-weight: 500;
  color: var(--fg-weak);
  letter-spacing: -0.3px;
}
.nl-detail-title {
  font-size: 22px; font-weight: 800;
  color: var(--fg);
  letter-spacing: -0.5px;
  line-height: 32px;
  word-break: keep-all;
}
.nl-detail-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 20px 40px;
  font-size: 15px;
  font-weight: 400;
  line-height: 26px;
  color: var(--fg);
  letter-spacing: -0.3px;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  max-width: 100%;
  box-sizing: border-box;
}
.nl-detail-body a {
  color: var(--fg);
  word-break: break-all;
}

/* ============ Todo Detail Page (full screen overlay) ============ */
.detail-page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  max-width: 480px;
  margin: 0 auto;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.detail-page.open { transform: translateY(0); }

.detail-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
}
.detail-nav .left, .detail-nav .right {
  display: flex; align-items: center; gap: 18px;
}
.detail-nav button {
  width: 28px; height: 28px;
  background: none; border: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--fg);
}
.detail-nav button svg { width: 22px; height: 22px; }

.detail-head {
  padding: 12px 20px 4px;
  display: flex; align-items: center; gap: 12px;
}
.detail-head .checkbox {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1.5px solid #D0D0D0;
  background: #fff;
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.detail-head .checkbox svg { display: none; width: 14px; height: 14px; color: #fff; }
.detail-head .checkbox.checked { background: var(--fg); border-color: var(--fg); }
.detail-head .checkbox.checked svg { display: block; }
.detail-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.5px;
  word-break: keep-all;
  line-height: 30px;
}

.detail-meta {
  padding: 16px 20px 8px;
  display: flex; flex-direction: column;
  gap: 14px;
}
.meta-row {
  display: flex; align-items: center; gap: 10px;
}
.meta-row .icon {
  width: 18px; height: 18px;
  color: var(--fg-weak);
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
}
.meta-row .icon svg { width: 18px; height: 18px; }
.meta-row .value {
  font-size: 14px;
  font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.3px;
}
.meta-row .value-weak { color: var(--fg-weak); }
.meta-row a.value-link {
  color: var(--fg);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.meta-row a.value-link .ext {
  width: 14px; height: 14px;
  color: var(--fg-weak);
}

.detail-priority-badge {
  display: inline-flex; align-items: center; justify-content: center;
  height: 22px;
  padding: 0 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.detail-priority-badge.p1 { background: var(--p1); }
.detail-priority-badge.p2 { background: var(--p2); }
.detail-priority-badge.p3 { background: var(--p3); color: #4a3500; }
.detail-priority-badge.p4 { background: var(--p4); }

.detail-divider {
  height: 1px;
  background: var(--line);
  margin: 8px 20px;
}

.detail-body {
  padding: 16px 20px 40px;
  font-size: 15px;
  font-weight: 500;
  line-height: 24px;
  color: var(--fg);
  letter-spacing: -0.3px;
  white-space: pre-wrap;
  word-break: keep-all;
  flex: 1;
  overflow-y: auto;
}
</style>
</head>
<body>

<header class="top-nav">
  <div class="left">
    <span class="logo">🔥</span>
  </div>
  <div class="right">
    <button class="icon-btn" id="btn-calendar" aria-label="캘린더">
      <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="5" width="17" height="15" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M3.5 9.5h17M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn" id="btn-refresh" aria-label="새로고침">
      <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12a9 9 0 0 1 15.5-6.3M21 4v5h-5M21 12a9 9 0 0 1-15.5 6.3M3 20v-5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</header>

<!-- 오늘 일정 (schedule) -->
<section class="schedule" id="schedule"></section>

<!-- Tab -->
<nav class="tabs">
  <button class="tab on" data-tab="open">할 일<span class="count" id="open-count">0</span></button>
  <button class="tab" data-tab="newsletter">뉴스레터<span class="count" id="newsletter-count">0</span></button>
</nav>

<!-- Todo list -->
<section class="todo-list" id="todo-list"></section>

<!-- Newsletter list -->
<section class="newsletter-list" id="newsletter-list" hidden></section>


<!-- Calendar page overlay -->
<div class="cal-page" id="cal-page">
  <div class="cal-nav">
    <button id="cal-back" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="cal-month-switch">
      <button id="cal-prev" aria-label="이전 달">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button id="cal-next" aria-label="다음 달">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <span style="width:28px"></span>
  </div>

  <div class="cal-weekdays">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="cal-grid" id="cal-grid"></div>

  <div class="cal-divider"></div>
  <div class="cal-day-section">
    <div class="cal-day-label" id="cal-day-label">날짜를 선택해주세요</div>

    <div class="cal-day-block">
      <div class="cal-day-block-title">📅 일정</div>
      <div id="cal-day-events" class="cal-day-events"></div>
    </div>
    <div class="cal-day-block">
      <div class="cal-day-block-title">✓ 완료한 일</div>
      <div id="cal-day-todos" class="cal-day-todos"></div>
    </div>
  </div>
</div>

<script>
let SCHEDULE = [];
let SCHEDULE_FULL = []; // 캘린더 페이지용 (필터 안 한 전체)
let TODOS = [];
let TODOS_RAW = []; // done 기록용 (필터 무관)
let NEWSLETTERS = [];
let activeTab = 'open';

// 사용자가 직접 토글한 완료 상태 — localStorage
function loadLocalDone() {
  try { return new Set(JSON.parse(localStorage.getItem('danaDone') || '[]')); }
  catch { return new Set(); }
}
function saveLocalDone(set) {
  localStorage.setItem('danaDone', JSON.stringify([...set]));
}
let LOCAL_DONE = loadLocalDone();

// 완료 시각 기록 (캘린더 history용) — {id: ISO date string}
function loadDoneAt() {
  try { return JSON.parse(localStorage.getItem('danaDoneAt') || '{}'); }
  catch { return {}; }
}
function saveDoneAt(obj) { localStorage.setItem('danaDoneAt', JSON.stringify(obj)); }
let DONE_AT = loadDoneAt();
function markDone(id) {
  LOCAL_DONE.add(id);
  saveLocalDone(LOCAL_DONE);
  DONE_AT[id] = new Date().toISOString();
  saveDoneAt(DONE_AT);
}
function unmarkDone(id) {
  LOCAL_DONE.delete(id);
  saveLocalDone(LOCAL_DONE);
  delete DONE_AT[id];
  saveDoneAt(DONE_AT);
}

function nowHM() { const d = new Date(); return d.getHours() * 60 + d.getMinutes(); }
function fmtDateNow() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseHM(str) {
  // "10:45" 또는 "10:45 - 11:30" 에서 종료 시각 추출
  const m = str.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
  if (m) return { start: +m[1]*60+ +m[2], end: +m[3]*60+ +m[4] };
  const m2 = str.match(/(\d{1,2}):(\d{2})/);
  if (m2) return { start: +m2[1]*60+ +m2[2], end: +m2[1]*60+ +m2[2]+60 };
  return { start: 0, end: 0 };
}

async function fetchData() {
  try {
    const calRes = await fetch('./data/calendar.json?t=' + Date.now());
    const calData = await calRes.json();
    SCHEDULE_FULL = calData.events || [];
    // 메인 화면: 오늘 일정만 표시 + state 자동 계산 (past = strike-through)
    const todayKey = fmtDateNow();
    const now = nowHM();
    SCHEDULE = SCHEDULE_FULL
      .filter(e => !e.date || e.date === todayKey)
      .map(e => {
        const t = parseHM(e.time || '');
        let state = 'next';
        if (t.end <= now) state = 'past';
        else if (t.start <= now && t.end > now) state = 'now';
        return { ...e, state };
      });
  } catch (e) {
    SCHEDULE = [];
    SCHEDULE_FULL = [];
  }
  try {
    const todoRes = await fetch('./data/todos.json?t=' + Date.now());
    const todoData = await todoRes.json();
    TODOS_RAW = todoData.todos || [];
    TODOS = TODOS_RAW.map(t => ({ ...t, tab: 'open', done: LOCAL_DONE.has(t.id) }));
  } catch (e) {
    TODOS = [];
    TODOS_RAW = [];
  }
  try {
    const nlRes = await fetch('./data/newsletters.json?t=' + Date.now());
    const nlData = await nlRes.json();
    NEWSLETTERS = nlData.newsletters || [];
  } catch (e) {
    NEWSLETTERS = [];
  }
}

function renderSchedule() {
  const el = document.getElementById('schedule');
  el.innerHTML = '';
  SCHEDULE.forEach(s => {
    const card = document.createElement('div');
    card.className = 'schedule-card' + (s.state === 'past' ? ' past' : '');
    card.innerHTML = `
      <div class="schedule-time">${s.time}</div>
      <div class="schedule-title">${s.title}</div>
      <div class="schedule-loc">${s.loc}</div>
    `;
    el.appendChild(card);
  });
}

function prRank(p) { return { P1: 1, P2: 2, P3: 3, P4: 4 }[p] ?? 9; }

function renderTodos() {
  // tab counts
  document.getElementById('open-count').textContent = ' ' + TODOS.filter(t => !t.done).length;
  document.getElementById('newsletter-count').textContent = ' ' + NEWSLETTERS.filter(n => !NL_READ.has(n.id)).length;

  // active tab
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === activeTab));

  const todoListEl = document.getElementById('todo-list');
  const nlListEl = document.getElementById('newsletter-list');

  if (activeTab === 'newsletter') {
    todoListEl.hidden = true;
    nlListEl.hidden = false;
    renderNewsletters();
    return;
  }
  todoListEl.hidden = false;
  nlListEl.hidden = true;

  // list
  const list = TODOS.sort((a, b) => prRank(a.priority) - prRank(b.priority));
  const el = todoListEl;
  el.innerHTML = '';
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">모두 처리되었어요. 👏</div>';
    return;
  }
  list.forEach(t => {
    const row = document.createElement('div');
    row.className = 'todo-row' + (t.done ? ' done' : '');
    row.innerHTML = `
      <span class="checkbox ${t.done ? 'checked' : ''}" data-id="${t.id}">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="priority ${t.priority.toLowerCase()}">${t.priority}</span>
      <span class="todo-title">${t.title}</span>
    `;
    row.querySelector('.checkbox').addEventListener('click', (e) => {
      e.stopPropagation();
      t.done = !t.done;
      if (t.done) markDone(t.id);
      else unmarkDone(t.id);
      renderTodos();
    });
    row.addEventListener('click', (e) => {
      if (e.target.closest('.checkbox')) return;
      openDetail(t);
    });
    el.appendChild(row);
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => { activeTab = t.dataset.tab; renderTodos(); });
});

function loadNlRead() {
  try { return new Set(JSON.parse(localStorage.getItem('nlRead') || '[]')); }
  catch { return new Set(); }
}
function saveNlRead(set) { localStorage.setItem('nlRead', JSON.stringify([...set])); }
let NL_READ = loadNlRead();

function renderNewsletters() {
  const el = document.getElementById('newsletter-list');
  const visible = NEWSLETTERS.filter(n => !NL_READ.has(n.id));
  // 카운트 갱신
  const nlCountEl = document.getElementById('newsletter-count');
  if (nlCountEl) nlCountEl.textContent = ' ' + visible.length;
  el.innerHTML = '';
  if (visible.length === 0) {
    el.innerHTML = '<div class="empty">새 뉴스레터가 없어요.</div>';
    return;
  }
  visible.forEach(n => {
    const row = document.createElement('div');
    row.className = 'nl-row';
    row.innerHTML = `
      <div class="nl-meta">${escapeHtml(n.sender || '')} · ${escapeHtml(n.date || '')}</div>
      <div class="nl-subject">${escapeHtml(n.subject || '(제목 없음)')}</div>
      ${n.snippet ? `<div class="nl-snippet">${escapeHtml(n.snippet)}</div>` : ''}
    `;
    row.addEventListener('click', () => openNewsletter(n));
    el.appendChild(row);
  });
}

const nlDetailEl = document.getElementById('nl-detail-page');
async function openNewsletter(n) {
  document.getElementById('nl-detail-meta').textContent = `${n.sender || ''} · ${n.date || ''}`;
  document.getElementById('nl-detail-title').textContent = n.subject || '';
  document.getElementById('nl-open-gmail').href = n.url || '#';
  const bodyEl = document.getElementById('nl-detail-body');
  bodyEl.textContent = '불러오는 중…';
  nlDetailEl.classList.add('open');
  if (n.bodyPath) {
    try {
      const r = await fetch(n.bodyPath + '?t=' + Date.now());
      bodyEl.textContent = r.ok ? await r.text() : '(본문을 불러올 수 없어요)';
    } catch (e) {
      bodyEl.textContent = '(본문 fetch 실패)';
    }
  } else {
    bodyEl.textContent = '(본문 없음 — Gmail에서 열어주세요)';
  }
}
document.getElementById('nl-back').addEventListener('click', () => {
  nlDetailEl.classList.remove('open');
});

let nlCurrentId = null;
const _openNewsletter = openNewsletter;
openNewsletter = function(n) {
  nlCurrentId = n.id;
  return _openNewsletter(n);
};
document.getElementById('nl-mark-read').addEventListener('click', () => {
  if (!nlCurrentId) return;
  NL_READ.add(nlCurrentId);
  saveNlRead(NL_READ);
  nlDetailEl.classList.remove('open');
  renderNewsletters();
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ============ Detail overlay ============
const detailEl = document.getElementById('detail-page');
const detailTitleEl = document.getElementById('detail-title');
const detailPriorityEl = document.getElementById('detail-priority');
const detailCreatedEl = document.getElementById('detail-created');
const detailSourceEl = document.getElementById('detail-source');
const detailBodyEl = document.getElementById('detail-body');
const detailCheckboxEl = document.getElementById('detail-checkbox');
let detailCurrentTodo = null;

function openDetail(t) {
  detailCurrentTodo = t;
  detailTitleEl.textContent = t.title;
  detailPriorityEl.textContent = t.priority;
  detailPriorityEl.className = 'detail-priority-badge ' + t.priority.toLowerCase();
  // 등록 시각
  const created = t.createdAt || '';
  const team = t.team ? ` · ${t.team}` : '';
  const requester = t.requester ? ` · @${t.requester}` : '';
  detailCreatedEl.textContent = `${created}${team}${requester} 등록`;
  // 슬랙 링크
  if (t.source) {
    detailSourceEl.href = t.source;
    detailSourceEl.style.display = '';
  } else {
    detailSourceEl.style.display = 'none';
  }
  // 본문
  const body = t.body || `(${t.channel || '슬랙'} 채널에서 ${t.requester || '요청자'} 님이 작업을 요청했어요)`;
  detailBodyEl.textContent = body;
  // 체크 상태
  detailCheckboxEl.classList.toggle('checked', !!t.done);

  detailEl.classList.add('open');
}
function closeDetail() {
  detailEl.classList.remove('open');
  detailCurrentTodo = null;
}
document.getElementById('detail-back').addEventListener('click', closeDetail);
detailCheckboxEl.addEventListener('click', () => {
  if (!detailCurrentTodo) return;
  detailCurrentTodo.done = !detailCurrentTodo.done;
  if (detailCurrentTodo.done) markDone(detailCurrentTodo.id);
  else unmarkDone(detailCurrentTodo.id);
  detailCheckboxEl.classList.toggle('checked', detailCurrentTodo.done);
  renderTodos();
});

// ============ Web Push 구독 ============
const VAPID_PUBLIC_KEY = 'BDXsRe9zkoh4wbEDrZvsZtDDtLM_eXo7vlVZpE7CvcG4hH74IB73f3nBOeaurHD1Zg_U-xdbGT_emCVfU3lhU-A';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    console.log('Push not supported');
    return;
  }
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    await navigator.serviceWorker.ready;

    // 이미 구독했는지 확인
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      // 권한 요청은 사용자 액션(버튼 클릭) 필요. 자동 호출 X.
      console.log('No subscription yet — tap 알림 켜기 버튼');
      return;
    }
    // 기존 구독 endpoint를 화면에 표시
    showSubscription(sub);
  } catch (e) {
    console.error('SW register failed', e);
  }
}

async function requestPushPermission() {
  const reg = await navigator.serviceWorker.ready;
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    alert('알림 권한을 허용해야 푸시를 받을 수 있어요');
    return;
  }
  const sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
  });
  showSubscription(sub);
}

function showSubscription(sub) {
  const subJson = JSON.stringify(sub.toJSON(), null, 2);
  const box = document.getElementById('sub-box');
  const text = document.getElementById('sub-text');
  if (box && text) {
    text.value = subJson;
    box.hidden = false;
  }
  console.log('Subscription:', subJson);
}

document.getElementById('btn-enable-push')?.addEventListener('click', requestPushPermission);
document.getElementById('btn-copy-sub')?.addEventListener('click', () => {
  const text = document.getElementById('sub-text');
  if (text) {
    text.select();
    document.execCommand('copy');
    alert('구독 정보를 복사했어요. 채팅에 붙여넣어주세요.');
  }
});

async function init() {
  await fetchData();
  renderSchedule();
  renderTodos();
  setupPush();
}

// ============ Calendar 페이지 ============
const calPageEl = document.getElementById('cal-page');
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth(); // 0-based
let calSelectedDate = null; // 'YYYY-MM-DD'

function fmtDate(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderCalendar() {
  const monthLabel = `${calViewYear}년 ${calViewMonth+1}월`;
  document.getElementById('cal-month-label').textContent = monthLabel;

  const first = new Date(calViewYear, calViewMonth, 1);
  const firstDow = first.getDay(); // 0=Sun
  const lastDay = new Date(calViewYear, calViewMonth+1, 0).getDate();
  const prevLastDay = new Date(calViewYear, calViewMonth, 0).getDate();
  const todayKey = fmtDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  // 완료 날짜 인덱스 — DONE_AT 기반 (YYYY-MM-DD set)
  const doneDates = new Set();
  Object.values(DONE_AT).forEach(iso => doneDates.add(iso.slice(0, 10)));

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  // 이전 달 빈칸
  for (let i = firstDow - 1; i >= 0; i--) {
    const d = prevLastDay - i;
    const cell = document.createElement('div');
    cell.className = 'cal-cell muted';
    cell.textContent = d;
    grid.appendChild(cell);
  }
  // 이번 달
  for (let d = 1; d <= lastDay; d++) {
    const key = fmtDate(calViewYear, calViewMonth, d);
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (key === todayKey) cell.classList.add('today');
    if (key === calSelectedDate) cell.classList.add('selected');
    cell.innerHTML = `${d}${doneDates.has(key) ? '<span class="dot"></span>' : ''}`;
    cell.addEventListener('click', () => {
      calSelectedDate = key;
      renderCalendar();
      renderDaySection(key);
    });
    grid.appendChild(cell);
  }
  // 다음 달 빈칸 (그리드 6주 채우기)
  const rest = (7 - ((firstDow + lastDay) % 7)) % 7;
  for (let d = 1; d <= rest; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell muted';
    cell.textContent = d;
    grid.appendChild(cell);
  }
}

function renderDaySection(dateKey) {
  const [y, m, d] = dateKey.split('-').map(Number);
  const dow = ['일','월','화','수','목','금','토'][new Date(y, m-1, d).getDay()];
  document.getElementById('cal-day-label').textContent = `${m}월 ${d}일 (${dow})`;

  const todayKey = fmtDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  // 일정 — calendar.json events 중 선택일 필터
  const evtEl = document.getElementById('cal-day-events');
  evtEl.innerHTML = '';
  const dayEvents = (SCHEDULE_FULL || []).filter(e => e.date === dateKey);
  if (dayEvents.length) {
    dayEvents.forEach(e => {
      const row = document.createElement('div');
      row.className = 'cal-evt-row';
      row.innerHTML = `<span class="time">${e.time || ''}</span>${escapeHtml(e.title || '')}`;
      evtEl.appendChild(row);
    });
  } else {
    evtEl.innerHTML = '<div class="cal-empty">일정 없음</div>';
  }

  // 완료한 일 — DONE_AT + TODOS_RAW에서 매칭
  const todoEl = document.getElementById('cal-day-todos');
  todoEl.innerHTML = '';
  const matched = [];
  Object.entries(DONE_AT).forEach(([id, iso]) => {
    if (iso.slice(0, 10) !== dateKey) return;
    const t = TODOS_RAW.find(x => x.id === id);
    if (t) matched.push({ ...t, doneAt: iso });
  });
  matched.sort((a, b) => a.doneAt.localeCompare(b.doneAt));
  if (matched.length === 0) {
    todoEl.innerHTML = '<div class="cal-empty">완료한 일 없음</div>';
  } else {
    matched.forEach(t => {
      const hh = t.doneAt.slice(11, 16);
      const row = document.createElement('div');
      row.className = 'cal-todo-row';
      row.innerHTML = `<span class="time">${hh}</span>${escapeHtml(t.title || '')}`;
      todoEl.appendChild(row);
    });
  }
}

document.getElementById('btn-calendar')?.addEventListener('click', () => {
  const todayKey = fmtDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  calSelectedDate = todayKey;
  calViewYear = new Date().getFullYear();
  calViewMonth = new Date().getMonth();
  calPageEl.classList.add('open');
  renderCalendar();
  renderDaySection(todayKey);
});
document.getElementById('cal-back')?.addEventListener('click', () => {
  calPageEl.classList.remove('open');
});
document.getElementById('cal-prev')?.addEventListener('click', () => {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderCalendar();
});
document.getElementById('cal-next')?.addEventListener('click', () => {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCalendar();
});

// 새로고침 버튼
document.getElementById('btn-refresh')?.addEventListener('click', async (e) => {
  const btn = e.currentTarget;
  btn.classList.add('spinning');
  try {
    // 새 데이터 fetch + UI 갱신
    LOCAL_DONE = loadLocalDone();
    await fetchData();
    renderSchedule();
    renderTodos();
  } finally {
    setTimeout(() => btn.classList.remove('spinning'), 400);
  }
});

init();
</script>
